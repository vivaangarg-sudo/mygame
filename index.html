<!DOCTYPE html>
<html>
<head>
    <title>Vivaan's Forest Game</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1b2a1a; color: #e0e0e0; padding-top: 50px; }
        button { background: #3e6b48; color: white; border: none; padding: 15px 30px; font-size: 20px; border-radius: 8px; cursor: pointer; margin: 10px; }
        button:hover { background: #528e5f; }
        #box { background: #2a3d29; width: 60%; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="box">
        <h1>🌲 Welcome to the Game! 🌲</h1>
        <p id="story-text">Chose Your Path, You may go left or right</p>
        
        <div id="buttons">
            <button onclick="choosePath('left')">Go Left</button>
            <button onclick="choosePath('right')">Go Right</button>
        </div>
    </div>

    <script>
        let hasKey = false;

        function choosePath(choice) {
            let text = document.getElementById('story-text');
            let btnDiv = document.getElementById('buttons');

            if (choice === 'left') {
                hasKey = true;
                text.innerHTML = "You find a key, it is old and rusty, but it might be useful later.<br><br>Do you want to go straight or turn left?";
                btnDiv.innerHTML = `
                    <button onclick="choosePath('straight')">Go Straight</button>
                    <button onclick="choosePath('turn_left')">Turn Left</button>
                `;
            } 
            else if (choice === 'right') {
                text.innerHTML = "The dirt path continues into the foggy forest, you can not see anything but you know danger lies ahead.";
                btnDiv.innerHTML = `<button onclick="location.reload()">Try Again</button>`;
            }
            else if (choice === 'straight') {
                text.innerHTML = "You continue down the path to find a treasure chest, you use the key to open it and find a pile of gold coins, you bribe any monster that comes by and win the game!!! 🎉💰";
                btnDiv.innerHTML = `<button onclick="location.reload()">Play Again</button>`;
            }
            else if (choice === 'turn_left') {
                text.innerHTML = "The path leads to a dead end, however you spot a tree that has berries on it, you can eat them to regain some health and stamina. 🍒";
                btnDiv.innerHTML = `<button onclick="location.reload()">Play Again</button>`;
            }
        }
    </script>

</body>
</html>
